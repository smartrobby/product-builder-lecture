<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동물상 테스트 🐶🐱</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root[data-theme="dark"] {
      --bg: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --title-color: #fff;
      --text-color: rgba(255, 255, 255, 0.8);
      --sub-color: rgba(255, 255, 255, 0.5);
      --theme-btn-bg: rgba(255, 255, 255, 0.1);
      --theme-btn-color: #fff;
      --theme-btn-border: rgba(255, 255, 255, 0.2);
      --theme-btn-hover: rgba(255, 255, 255, 0.2);
      --bar-bg: rgba(255, 255, 255, 0.1);
      --result-bg: rgba(255, 255, 255, 0.07);
      --drop-bg: rgba(255, 255, 255, 0.04);
      --drop-border: rgba(255, 255, 255, 0.2);
      --drop-hover: rgba(255, 255, 255, 0.08);
    }

    :root[data-theme="light"] {
      --bg: linear-gradient(135deg, #f0f4ff, #e8f0fe, #dce8ff);
      --card-bg: rgba(255, 255, 255, 0.75);
      --card-border: rgba(0, 0, 0, 0.1);
      --title-color: #1a1a2e;
      --text-color: #333;
      --sub-color: #888;
      --theme-btn-bg: rgba(26, 26, 46, 0.08);
      --theme-btn-color: #1a1a2e;
      --theme-btn-border: rgba(26, 26, 46, 0.15);
      --theme-btn-hover: rgba(26, 26, 46, 0.15);
      --bar-bg: rgba(0, 0, 0, 0.08);
      --result-bg: rgba(255, 255, 255, 0.6);
      --drop-bg: rgba(255, 255, 255, 0.5);
      --drop-border: rgba(0, 0, 0, 0.15);
      --drop-hover: rgba(255, 255, 255, 0.8);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: var(--bg);
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem 1rem 4rem;
      transition: background 0.4s;
    }

    .top-bar {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
    }

    #btn-theme {
      background: var(--theme-btn-bg);
      color: var(--theme-btn-color);
      border: 1px solid var(--theme-btn-border);
      border-radius: 50px;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      backdrop-filter: blur(8px);
    }

    #btn-theme:hover {
      background: var(--theme-btn-hover);
      transform: translateY(-2px);
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
      margin-top: 1rem;
    }

    h1 {
      color: var(--title-color);
      font-size: 2rem;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      margin-bottom: 0.5rem;
      transition: color 0.4s;
    }

    h1 span { color: #ffd700; }

    .subtitle {
      color: var(--sub-color);
      font-size: 0.95rem;
      transition: color 0.4s;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      backdrop-filter: blur(12px);
      transition: background 0.4s, border-color 0.4s;
    }

    /* 드롭존 */
    .drop-zone {
      border: 2px dashed var(--drop-border);
      border-radius: 16px;
      background: var(--drop-bg);
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: background 0.2s, border-color 0.2s;
    }

    .drop-zone:hover, .drop-zone.dragover {
      background: var(--drop-hover);
      border-color: #ffd700;
    }

    .drop-icon { font-size: 3rem; margin-bottom: 0.6rem; }

    .drop-text {
      color: var(--text-color);
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      transition: color 0.4s;
    }

    .drop-sub {
      color: var(--sub-color);
      font-size: 0.8rem;
      transition: color 0.4s;
    }

    #file-input { display: none; }

    /* 미리보기 이미지 */
    .preview-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 1.5rem;
      display: none;
      background: #000;
    }

    .preview-wrap.visible { display: block; }

    #preview-img {
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      display: block;
    }

    /* 결과 영역 */
    .result-box {
      background: var(--result-bg);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
      display: none;
      transition: background 0.4s;
    }

    .result-box.visible { display: block; }

    .result-animal { font-size: 4rem; margin-bottom: 0.3rem; }

    .result-label {
      font-size: 1.5rem;
      font-weight: 800;
      color: #ffd700;
      margin-bottom: 0.3rem;
    }

    .result-desc {
      color: var(--sub-color);
      font-size: 0.85rem;
      transition: color 0.4s;
    }

    /* 확률 바 */
    .bars { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.5rem; }

    .bar-item { display: flex; flex-direction: column; gap: 0.3rem; }

    .bar-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-color);
      transition: color 0.4s;
    }

    .bar-track {
      height: 10px;
      background: var(--bar-bg);
      border-radius: 99px;
      overflow: hidden;
      transition: background 0.4s;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width 0.6s ease;
    }

    .bar-fill.dog   { background: linear-gradient(90deg, #f5c518, #ff8c00); }
    .bar-fill.cat   { background: linear-gradient(90deg, #a78bfa, #ec4899); }
    .bar-fill.other { background: linear-gradient(90deg, #43e97b, #38f9d7); }

    /* 버튼 */
    .btn-primary {
      width: 100%;
      border: none;
      border-radius: 50px;
      padding: 0.95rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #1a1a2e;
      box-shadow: 0 6px 20px rgba(255, 215, 0, 0.35);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(255, 215, 0, 0.5);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(26,26,46,0.3);
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text {
      text-align: center;
      color: var(--sub-color);
      font-size: 0.85rem;
      margin-top: 1rem;
      min-height: 1.2em;
      transition: color 0.4s;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .card { padding: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <button id="btn-theme" onclick="toggleTheme()">☀️ 라이트 모드</button>
  </div>

  <div class="header">
    <h1>🐶 <span>동물상</span> 테스트 🐱</h1>
    <p class="subtitle">나는 강아지상? 고양이상? 사진을 올려 AI가 분석해드립니다</p>
  </div>

  <div class="card">
    <!-- 파일 업로드 드롭존 -->
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">🖼️</div>
      <div class="drop-text">클릭하거나 사진을 드래그하세요</div>
      <div class="drop-sub">JPG, PNG, WEBP 지원</div>
    </div>
    <input type="file" id="file-input" accept="image/*">

    <!-- 미리보기 -->
    <div class="preview-wrap" id="preview-wrap">
      <img id="preview-img" alt="업로드 이미지">
    </div>

    <!-- 결과 -->
    <div class="result-box" id="result-box">
      <div class="result-animal" id="result-emoji"></div>
      <div class="result-label" id="result-label"></div>
      <div class="result-desc" id="result-desc"></div>
    </div>

    <div class="bars" id="bars"></div>

    <button class="btn-primary" id="btn-analyze" onclick="document.getElementById('file-input').click()" disabled>
      🔍 다른 사진 분석하기
    </button>
    <p class="status-text" id="status">사진을 업로드하면 AI가 동물상을 분석합니다</p>
  </div>

  <script>
    const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/cBZUv1i_N/';
    const html = document.documentElement;
    const themeBtn = document.getElementById('btn-theme');

    function toggleTheme() {
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      themeBtn.textContent = isDark ? '🌙 다크 모드' : '☀️ 라이트 모드';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    (function applyStoredTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'light') {
        html.setAttribute('data-theme', 'light');
        themeBtn.textContent = '🌙 다크 모드';
      }
    })();

    const ANIMAL_META = {
      강아지: { emoji: '🐶', desc: '충성스럽고 친근한 강아지상이에요! 사람들에게 호감을 주는 인상입니다 🦴' },
      고양이: { emoji: '🐱', desc: '도도하고 매력적인 고양이상이에요! 신비로운 분위기를 풍깁니다 🐾' },
    };

    function getAnimalMeta(label) {
      for (const key of Object.keys(ANIMAL_META)) {
        if (label.includes(key)) return { key, ...ANIMAL_META[key] };
      }
      return { key: label, emoji: '🐾', desc: '독특하고 개성 있는 동물상이에요!' };
    }

    function getBarClass(label) {
      if (label.includes('강아지')) return 'dog';
      if (label.includes('고양이')) return 'cat';
      return 'other';
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    let model = null;

    async function loadModel() {
      if (model) return model;
      model = await tmImage.load(MODEL_URL + 'model.json', MODEL_URL + 'metadata.json');
      return model;
    }

    function initBars(labels) {
      const container = document.getElementById('bars');
      container.innerHTML = '';
      labels.forEach((label, i) => {
        container.innerHTML += `
          <div class="bar-item">
            <div class="bar-header">
              <span>${label}</span>
              <span id="pct-${i}">0%</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill ${getBarClass(label)}" id="bar-${i}"></div>
            </div>
          </div>`;
      });
    }

    function updateUI(preds) {
      preds.forEach((p, i) => {
        const pct = Math.round(p.probability * 100);
        document.getElementById(`bar-${i}`).style.width = pct + '%';
        document.getElementById(`pct-${i}`).textContent = pct + '%';
      });

      const top = preds.reduce((a, b) => a.probability > b.probability ? a : b);
      const meta = getAnimalMeta(top.className);
      document.getElementById('result-emoji').textContent = meta.emoji;
      document.getElementById('result-label').textContent = meta.key + '상';
      document.getElementById('result-desc').textContent = meta.desc;
      document.getElementById('result-box').classList.add('visible');
    }

    async function analyzeImage(file) {
      const btn = document.getElementById('btn-analyze');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span>분석 중...';
      setStatus('AI 모델을 불러오는 중입니다...');

      // 미리보기
      const url = URL.createObjectURL(file);
      const img = document.getElementById('preview-img');
      img.src = url;
      document.getElementById('preview-wrap').classList.add('visible');
      document.getElementById('drop-zone').style.display = 'none';

      // 결과 초기화
      document.getElementById('result-box').classList.remove('visible');

      try {
        const m = await loadModel();
        setStatus('이미지를 분석하는 중입니다...');

        await new Promise(resolve => { img.onload = resolve; if (img.complete) resolve(); });

        initBars(m.getClassLabels());
        const preds = await m.predict(img);
        updateUI(preds);
        setStatus('');
      } catch (e) {
        setStatus('분석 중 오류가 발생했습니다. 다시 시도해주세요.');
      }

      btn.disabled = false;
      btn.textContent = '🔍 다른 사진 분석하기';
    }

    // 파일 input 변경
    document.getElementById('file-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) analyzeImage(file);
      e.target.value = '';
    });

    // 드래그 앤 드롭
    const dropZone = document.getElementById('drop-zone');

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) analyzeImage(file);
    });

    // 다른 사진 분석 버튼 → 드롭존 다시 보이기
    document.getElementById('btn-analyze').addEventListener('click', () => {
      document.getElementById('drop-zone').style.display = '';
      document.getElementById('preview-wrap').classList.remove('visible');
      document.getElementById('result-box').classList.remove('visible');
      document.getElementById('bars').innerHTML = '';
      setStatus('사진을 업로드하면 AI가 동물상을 분석합니다');
    });

    // 페이지 로드 시 모델 미리 로드
    loadModel().then(() => {
      document.getElementById('btn-analyze').disabled = false;
      setStatus('사진을 업로드하면 AI가 동물상을 분석합니다');
    }).catch(() => {});
  </script>
</body>
</html>
