<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- 다크 배경 (둥근 모서리) -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- 골드 로또볼 -->
  <circle cx="16" cy="16" r="12" fill="url(#gold)"/>
  <!-- 빛 반사 -->
  <circle cx="16" cy="16" r="12" fill="url(#shine)"/>
  <!-- 중앙 흰색 띠 -->
  <path d="M4.5 16 Q16 12 27.5 16 Q16 20 4.5 16Z" fill="rgba(255,255,255,0.18)"/>
  <!-- 숫자 6 -->
  <text x="16" y="21.5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="15" fill="#1a1a2e">6</text>
</svg>
